# ----------------------------------------
# Al's Tmux Configuration
# GitHub Dark High Contrast Theme
# ----------------------------------------

# General --------------------------------
unbind C-b
set -g prefix C-a
bind C-a send-prefix

bind r source-file ~/.tmux.conf \; display "Config reloaded!"

# Terminal settings ----------------------
set -g default-terminal "tmux-256color"
set -sa terminal-features ",xterm-256color:RGB"
set -sa terminal-overrides ",xterm-256color:Tc"
set -g focus-events on
set -sg escape-time 10
setw -q -g utf8 on

# Navigation -----------------------------
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
unbind '"'
unbind %

# Switch panes using Alt-arrow (without prefix)
bind -n M-Left select-pane -L
bind -n M-Right select-pane -R
bind -n M-Up select-pane -U
bind -n M-Down select-pane -D

# Vim-style pane navigation
bind -r h select-pane -L
bind -r j select-pane -D
bind -r k select-pane -U
bind -r l select-pane -R

# Resize panes with Prefix + HJKL
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# Window navigation
bind -n M-1 select-window -t 1
bind -n M-2 select-window -t 2
bind -n M-3 select-window -t 3
bind -n M-4 select-window -t 4
bind -n M-5 select-window -t 5

# Mouse support --------------------------
set -g mouse on

# Window numbering -----------------------
set -g base-index 1
setw -g pane-base-index 1
setw -g automatic-rename on
set -g renumber-windows on
set -g set-titles on
set -g set-titles-string "#T"

# Copy mode (vi) -------------------------
setw -g mode-keys vi
bind -T copy-mode-vi v send-keys -X begin-selection
bind -T copy-mode-vi y send-keys -X copy-pipe-and-cancel "xclip -i -selection clipboard"
bind -T copy-mode-vi Enter send-keys -X copy-pipe-and-cancel "xclip -i -selection clipboard"

# Activity monitoring --------------------
set -g monitor-activity on
set -g visual-activity off

# History --------------------------------
set -g history-limit 50000

# Status bar position --------------------
set -g status-position top
set -g status-interval 5

# ----------------------------------------
# GitHub Dark High Contrast Theme
# ----------------------------------------

# Color palette
ghc_bg="#0a0c10"
ghc_bg_highlight="#161b22"
ghc_fg="#f0f3f6"
ghc_fg_dim="#9ea7b3"
ghc_red="#ff9492"
ghc_green="#26cd4d"
ghc_yellow="#f0b72f"
ghc_blue="#71b7ff"
ghc_magenta="#cb9eff"
ghc_cyan="#39c5cf"

# Status bar
set -g status-style "bg=${ghc_bg},fg=${ghc_fg}"
set -g status-left-length 40
set -g status-right-length 60

set -g status-left "#[fg=${ghc_bg},bg=${ghc_blue},bold] #S #[fg=${ghc_blue},bg=${ghc_bg}]"
set -g status-right "#[fg=${ghc_fg_dim}]%Y-%m-%d #[fg=${ghc_fg}]%H:%M #[fg=${ghc_green},bg=${ghc_bg}]#[fg=${ghc_bg},bg=${ghc_green},bold] #h "

# Window status
set -g window-status-format "#[fg=${ghc_fg_dim}] #I:#W "
set -g window-status-current-format "#[fg=${ghc_bg},bg=${ghc_blue}] #I:#W #[fg=${ghc_blue},bg=${ghc_bg}]"
set -g window-status-activity-style "fg=${ghc_yellow}"
set -g window-status-bell-style "fg=${ghc_red},bold"

# Pane borders
set -g pane-border-style "fg=${ghc_bg_highlight}"
set -g pane-active-border-style "fg=${ghc_blue}"

# Message style
set -g message-style "bg=${ghc_yellow},fg=${ghc_bg},bold"
set -g message-command-style "bg=${ghc_bg},fg=${ghc_yellow}"

# Copy mode
set -g mode-style "bg=${ghc_blue},fg=${ghc_bg}"

# Clock
set -g clock-mode-colour "${ghc_blue}"

# ----------------------------------------
# Session Management
# ----------------------------------------
bind S command-prompt -p "New session:" "new-session -s '%%'"
bind K confirm-before -p "Kill session #S? (y/n)" kill-session

