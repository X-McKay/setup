---
name: Release

"on":
  push:
    tags:
      - 'v*'

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Build release binary
        working-directory: cli
        run: cargo build --release

      - name: Create release assets
        run: |
          mkdir -p release
          cp cli/target/release/setup release/
          tar -czvf setup-linux-x86_64.tar.gz -C release setup
          sha256sum setup-linux-x86_64.tar.gz install.sh > checksums.txt

      - name: Get version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          name: Setup ${{ steps.version.outputs.VERSION }}
          body: |
            ## Setup CLI ${{ steps.version.outputs.VERSION }}

            Install this release:

            ```bash
            curl -fsSL https://github.com/X-McKay/setup/releases/download/${{ steps.version.outputs.VERSION }}/install.sh | bash -s -- --version ${{ steps.version.outputs.VERSION }}
            ```

            Manual assets:
            - `setup-linux-x86_64.tar.gz`
            - `checksums.txt`

            See CHANGELOG.md for release details.
          files: |
            install.sh
            checksums.txt
            setup-linux-x86_64.tar.gz
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
